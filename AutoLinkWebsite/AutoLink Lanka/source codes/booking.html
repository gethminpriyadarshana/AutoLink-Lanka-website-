<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Online Booking - AutoLinkLanka</title>
<link rel="stylesheet" href="style.css">

<style>



body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#1e3c72,#2a5298);
}



.booking-section{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}



.booking-card{
background:white;
padding:40px;
border-radius:15px;
width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}



.booking-card h2{
margin-bottom:25px;
}



.booking-card input,
.booking-card select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}


.book-btn{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#1335cd;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.book-btn:hover{
background:#0e289e;
transform:scale(1.03);
}

</style>

</head>

<body>

<section class="booking-section">

<div class="booking-card">

<h2>Online Booking</h2>

<form>

<input type="text" placeholder="Full Name" required>

<input type="text" placeholder="Vehicle Number" required>

<select>
<option>Select Service</option>
<option>Body Wash</option>
<option>Cut & Polish</option>
<option>Oil Change</option>
</select>

<input type="date">

<input type="time">

<button class="book-btn">Book Service</button>

</form>

</div>

</section>

</body>

</html>
